name: test

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:

  build-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          # No shallow checkout, i.e. fetch all tags (used for versioning the binary).
          fetch-depth: 0

      - id: free_disk
        uses: ./.github/actions/free_disk

      - id: setup_build
        uses: ./.github/actions/setup_build

      - name: "Build With All Features"
        env:
          RUST_BACKTRACE: 1
        run: cargo build --all-features

      # Just to monitor the runner's disk consumption.
      - name: Monitor Disk Space (End)
        run: df -h

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          # No shallow checkout, i.e. fetch all tags (used for versioning the binary).
          fetch-depth: 0

      - id: free_disk
        uses: ./.github/actions/free_disk

      - id: setup_build
        uses: ./.github/actions/setup_build
      - id: setup_clients
        uses: ./.github/actions/setup_clients

      - name: "Build & Run Tests"
        uses: pre-commit/action@v3.0.1
        env:
          RUST_BACKTRACE: 1
        with:
          extra_args: "--all-files --verbose"

      # Just to monitor the runner's disk consumption.
      - name: Monitor Disk Space (End)
        run: df -h

  test-websocket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          # No shallow checkout, i.e. fetch all tags (used for versioning the binary).
          fetch-depth: 0

      - id: free_disk
        uses: ./.github/actions/free_disk

      - id: setup_build
        uses: ./.github/actions/setup_build

      - name: "Test Rust Client"
        env:
          RUST_BACKTRACE: 1
        run: cd crates/client && cargo test --features=ws
      - name: "Test TypeScript Client"
        env:
          USE_WS: 1
        run: cd crates/assets/js/client && pnpm test

      # Just to monitor the runner's disk consumption.
      - name: Monitor Disk Space (End)
        run: df -h
